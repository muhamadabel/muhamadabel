<svg viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muhammad Abel Abhinaya - Frontend Developer">
  <defs>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A371F7" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#A371F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#56D4DD" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#56D4DD" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="350" y1="0" x2="850" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.5" stop-color="#A371F7"/>
      <stop offset="1" stop-color="#56D4DD"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-500 0" to="500 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <style>
      .fade { opacity: 0; animation: fadeUp 0.9s ease-out forwards; }
      .d1 { animation-delay: 0.2s; }
      .d2 { animation-delay: 0.5s; }
      .cur { animation: blink 1.1s steps(1) infinite; }
      .o1 { animation: float1 12s ease-in-out infinite; }
      .o2 { animation: float2 15s ease-in-out infinite; }
      .o3 { animation: float3 18s ease-in-out infinite; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes float1 { 0%, 100% { transform: translate(0px, 0px); } 50% { transform: translate(70px, 26px); } }
      @keyframes float2 { 0%, 100% { transform: translate(0px, 0px); } 50% { transform: translate(-60px, -30px); } }
      @keyframes float3 { 0%, 100% { transform: translate(0px, 0px); } 50% { transform: translate(40px, -24px); } }
    </style>
  </defs>

  <rect width="1200" height="280" fill="#0D1117"/>

  <g filter="url(#soft)">
    <circle class="o1" cx="240" cy="80" r="150" fill="url(#orb1)"/>
    <circle class="o2" cx="980" cy="210" r="170" fill="url(#orb2)"/>
    <circle class="o3" cx="640" cy="10" r="130" fill="url(#orb3)"/>
  </g>

  <rect width="1200" height="280" fill="url(#dots)"/>

  <g text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text class="fade d1" x="600" y="140" font-size="52" font-weight="800" fill="url(#nameGrad)">Muhammad Abel Abhinaya</text>
    <text class="fade d2" x="600" y="188" font-size="21" font-weight="500" letter-spacing="4" fill="#8B949E" font-family="'Fira Code', 'Courier New', monospace">FRONTEND DEVELOPER<tspan class="cur" fill="#58A6FF"> _</tspan></text>
  </g>
</svg>
